<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Marcadores AR (Pixelado Eficiente)</title>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/examples/marker-training/threex-arpatternfile.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        canvas { border: 2px solid #333; margin-top: 20px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        button { margin: 10px; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .instrucciones { max-width: 600px; margin: 0 auto 20px auto; text-align: left; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <h2>1. Sube tu imagen</h2>
    <div class="instrucciones">
        <p>El sistema convertirá tu imagen a <strong>blanco y negro</strong> y la <strong>pixelará a una cuadrícula de 16x16</strong>. Esto maximiza la eficiencia de lectura de AR.js.</p>
    </div>
    
    <input type="file" id="imageInput" accept="image/png, image/jpeg, image/svg+xml">

    <br>

    <canvas id="markerCanvas" width="512" height="512"></canvas>

    <br><br>

    <h2>2. Descarga tus archivos</h2>
    <button id="btnDescargarPNG" disabled>Descargar Marcador (PNG)</button>
    <button id="btnDescargarPATT" disabled>Descargar Archivo de Datos (.patt)</button>

    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('markerCanvas');
        const ctx = canvas.getContext('2d');
        const btnPNG = document.getElementById('btnDescargarPNG');
        const btnPATT = document.getElementById('btnDescargarPATT');

        let pixelatedImageForPattern = '';

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                drawMarker(event.target.result);
            }
            reader.readAsDataURL(file);
        });

        function drawMarker(imageSrc) {
            const img = new Image();
            img.onload = function() {
                const gridSize = 16; // La cuadrícula interna que leerá el motor de AR.js
                const innerSize = canvas.width * 0.5; // 256 (tamaño del centro)
                const offset = (canvas.width - innerSize) / 2; // 128 (margen negro)

                // 1. Dibujar el marco negro exterior
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 2. Crear un canvas "diminuto" de 16x16 píxeles
                const tinyCanvas = document.createElement('canvas');
                tinyCanvas.width = gridSize;
                tinyCanvas.height = gridSize;
                const tCtx = tinyCanvas.getContext('2d');

                // 3. Pintar fondo blanco y dibujar la imagen en el canvas diminuto (aplicando blanco y negro)
                tCtx.fillStyle = 'white';
                tCtx.fillRect(0, 0, gridSize, gridSize);
                tCtx.filter = 'grayscale(100%) contrast(150%)';
                tCtx.drawImage(img, 0, 0, gridSize, gridSize);
                tCtx.filter = 'none';

                // 4. MAGIA: Desactivar el suavizado al escalar en el canvas principal
                // Esto hace que la imagen no se vea borrosa, sino como píxeles grandes y duros.
                ctx.imageSmoothingEnabled = false;

                // 5. Dibujar la imagen de 16x16 ampliada al tamaño de 256x256 en el centro del marcador
                ctx.drawImage(tinyCanvas, 0, 0, gridSize, gridSize, offset, offset, innerSize, innerSize);

                // 6. Guardar la imagen en B/N y tamaño original para la creación del .patt
                pixelatedImageForPattern = tinyCanvas.toDataURL('image/png');

                // Habilitar botones
                btnPNG.disabled = false;
                btnPATT.disabled = false;
            }
            img.src = imageSrc;
        }

        btnPNG.addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = 'marcador_16x16.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        btnPATT.addEventListener('click', function() {
            THREEx.ArPatternFile.encodeImageURL(pixelatedImageForPattern, function(patternFileString) {
                const blob = new Blob([patternFileString], {type: 'text/plain'});
                const link = document.createElement('a');
                link.download = 'patron_16x16.patt';
                link.href = URL.createObjectURL(blob);
                link.click();
            });
        });
    </script>
</body>
</html>
