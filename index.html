<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Experiencia AR Corazón - Control de Ritmo</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;">
        
        <a-assets>
            <a-asset-item id="modelo-corazon" src="corazon.glb?v=5"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="marcador1.patt">
            <a-entity 
                id="entidad-corazon"
                gltf-model="#modelo-corazon" 
                scale="0.05 0.05 0.05" 
                position="0 0.5 0"
                rotation="-90 0 0"
                animation-mixer="clip: *; timeScale: 1">
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="marcador2.patt" id="marker-fast">
            <a-box color="red" scale="0.2 0.2 0.2" position="0 0.5 0" opacity="0.6"></a-box>
        </a-marker>

        <a-marker type="pattern" url="marcador3.patt" id="marker-slow">
            <a-box color="blue" scale="0.2 0.2 0.2" position="0 0.5 0" opacity="0.6"></a-box>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const corazon = document.querySelector('#entidad-corazon');
        const mFast = document.querySelector('#marker-fast');
        const mSlow = document.querySelector('#marker-slow');

        // Lógica de aceleración (Marcador 2)
        mFast.addEventListener('markerFound', () => {
            corazon.setAttribute('animation-mixer', 'timeScale: 4');
        });
        mFast.addEventListener('markerLost', () => {
            corazon.setAttribute('animation-mixer', 'timeScale: 1');
        });

        // Lógica de ralentización (Marcador 3)
        mSlow.addEventListener('markerFound', () => {
            corazon.setAttribute('animation-mixer', 'timeScale: 0.3');
        });
        mSlow.addEventListener('markerLost', () => {
            corazon.setAttribute('animation-mixer', 'timeScale: 1');
        });
    </script>
</body>
</html>
